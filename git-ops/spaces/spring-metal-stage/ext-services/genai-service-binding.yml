apiVersion: services.tanzu.vmware.com/v1
kind: ServiceBinding
metadata:
  name: boneyard-chat-boneyard-assist
  namespace: default
spec:
  alias: boneyard-chat
  serviceRef:
    apiGroup: services.tanzu.vmware.com
    connectorName: main
    kind: PreProvisionedService
    name: boneyard-chat
  targetRef:
    apiGroup: apps.tanzu.vmware.com
    kind: ContainerApp
    name: boneyard-assist

---
apiVersion: services.tanzu.vmware.com/v1
kind: ServiceBinding
metadata:
  name: boneyard-embeddings-boneyard-assist
  namespace: default
spec:
  alias: boneyard-embeddings
  serviceRef:
    apiGroup: services.tanzu.vmware.com
    connectorName: main
    kind: PreProvisionedService
    name: boneyard-embeddings
  targetRef:
    apiGroup: apps.tanzu.vmware.com
    kind: ContainerApp
    name: boneyard-assist
